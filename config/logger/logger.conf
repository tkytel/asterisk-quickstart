;
; Logging Configuration
;
; Custom logger config for this project.
; Keep console output quiet enough for day-to-day use while preserving
; useful information in files for debugging.
;

[general]

[logfiles]
; Suppress NOTICE-level messages on the console so unmatched endpoint
; notices such as incoming OPTIONS probes do not clutter `docker compose logs`.
console => warning,error

; Keep standard operational logs in files.
messages.log => notice,warning,error

; Optional detailed log file for future troubleshooting.
;full.log => notice,warning,error,debug,verbose,dtmf,fax
