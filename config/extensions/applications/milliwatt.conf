; milliwatt
; This extension is used for testing the audio quality of the system. When you dial 100, you will hear a continuous tone (the "milliwatt" signal) that can be used to measure the audio quality of the call. You can use this signal to check for any issues with the audio path, such as distortion or noise. To test this extension, simply dial 100 from your phone and listen to the tone.

exten => 100,1,NoOp(milliwatt)
    same => n,Answer()
    same => n,Milliwatt()
    same => n,Hangup()
