[transport-v4udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
allow_reload=yes

[global]
type=global
endpoint_identifier_order=username,ip,anonymous

[transport-v6udp]
type=transport
protocol=udp
bind=[::]:5060
allow_reload=yes

#include "pjsip/internal/*.conf"
#include "pjsip/templates/external-trunk.conf"
#include "pjsip/external/*.conf"
